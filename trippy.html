<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SHROOM QUEST — A Trippy 90s Platformer</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #050010;
    overflow: hidden;
    font-family: "Courier New", monospace;
    color: #fff;
    user-select: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a0033 0%, #050010 70%);
  }
  #game {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    box-shadow: 0 0 60px #ff00ff44, 0 0 120px #00ffff22;
    max-width: 100vw;
    max-height: 100vh;
  }
  #hud {
    position: fixed;
    top: 12px; left: 50%; transform: translateX(-50%);
    font-size: 14px;
    letter-spacing: 2px;
    text-shadow: 0 0 6px #ff00ff, 2px 2px 0 #000;
    pointer-events: none;
    white-space: nowrap;
  }
  #title {
    position: fixed;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 28px;
    text-align: center;
    text-shadow: 0 0 12px #ff00ff, 0 0 24px #00ffff, 3px 3px 0 #000;
    animation: pulse 2s ease-in-out infinite;
    pointer-events: none;
  }
  #title small { display: block; font-size: 13px; margin-top: 14px; opacity: 0.85; letter-spacing: 4px; }
  #title .ctrls { font-size: 10px; margin-top: 18px; opacity: 0.7; letter-spacing: 1px; line-height: 1.6; }
  @keyframes pulse {
    0%, 100% { filter: hue-rotate(0deg); transform: translate(-50%, -50%) scale(1); }
    50% { filter: hue-rotate(180deg); transform: translate(-50%, -50%) scale(1.03); }
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="game" width="320" height="192"></canvas>
<div id="hud" class="hidden"><span id="hud-coins">COINS: 00</span> &nbsp;&nbsp; <span id="hud-lives">♥♥♥</span></div>
<div id="title">
  ✦ SHROOM QUEST ✦
  <small>A TRIPPY 90s ADVENTURE</small>
  <div class="ctrls">
    ← → / A D &nbsp; MOVE<br>
    SPACE / ↑ / W &nbsp; JUMP<br>
    SHIFT &nbsp; SPRINT<br>
    M &nbsp; MUTE &nbsp;&nbsp; R &nbsp; RESTART<br><br>
    [ PRESS ANY KEY TO BEGIN ]
  </div>
</div>

<script>
(() => {
'use strict';

// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const TILE = 16;
const VIEW_W = 320, VIEW_H = 192;
const COLS_VIS = VIEW_W / TILE;     // 20
const ROWS_VIS = VIEW_H / TILE;     // 12

const GRAVITY = 0.42;
const MAX_FALL = 7;
const MAX_RUN = 2.0;
const MAX_SPRINT = 3.3;
const ACCEL = 0.35;
const FRICTION = 0.28;
const JUMP_V = -7.6;
const JUMP_CUT = -3.5;
const COYOTE_FRAMES = 6;
const JUMP_BUFFER_FRAMES = 6;

const STAR_DURATION = 300; // frames @ 60fps = 5s

// ═══════════════════════════════════════════════════════════════
//  LEVEL  (60 wide × 12 tall)
//    G ground   = platform   o coin   E enemy spawn
//    S star     C checkpoint F goal flag
// ═══════════════════════════════════════════════════════════════
const LEVEL = [
  "............................................................",
  "............................................................",
  "............................................................",
  "............o..........o.o.o................................",
  "............................................................",
  ".......o.........===............o.o..........====...........",
  ".................................................o.o...S...",
  ".....===.................===.................========.......",
  "..............E........................E.............o.o..F",
  "...........................==..C.................o.........",
  "GGGGGGGGGGGGG..GGGGGGGGGGGGGGGGGGGGGG..GGGGGGGGGGGGGGGGGGGGGG",
  "GGGGGGGGGGGGG..GGGGGGGGGGGGGGGGGGGGGG..GGGGGGGGGGGGGGGGGGGGGG",
];
const LEVEL_W = LEVEL[0].length;
const LEVEL_H = LEVEL.length;
const WORLD_W = LEVEL_W * TILE;
const WORLD_H = LEVEL_H * TILE;

// Parsed world: solids[y][x] = true/false; entities harvested.
const solids = [];
const entitiesInit = { coins: [], enemies: [], star: null, checkpoint: null, flag: null, playerStart: { x: 24, y: 100 } };
for (let y = 0; y < LEVEL_H; y++) {
  solids[y] = [];
  for (let x = 0; x < LEVEL_W; x++) {
    const c = LEVEL[y][x];
    const px = x * TILE, py = y * TILE;
    if (c === 'G' || c === '=') solids[y][x] = true;
    else solids[y][x] = false;
    if (c === 'o') entitiesInit.coins.push({ x: px + 4, y: py + 4, spin: Math.random() * Math.PI * 2, taken: false });
    else if (c === 'E') entitiesInit.enemies.push({ spawnX: px, spawnY: py });
    else if (c === 'S') entitiesInit.star = { x: px, y: py, taken: false, spin: 0 };
    else if (c === 'C') entitiesInit.checkpoint = { x: px, y: py, hit: false };
    else if (c === 'F') entitiesInit.flag = { x: px, y: py };
  }
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
const keys = {};
const justPressed = {};
addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  // prevent scroll on arrows / space
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  // boot game on first key
  if (!state.started) startGame();
}, { passive: false });
addEventListener('keyup', e => { keys[e.code] = false; });

const left = () => keys['ArrowLeft'] || keys['KeyA'];
const right = () => keys['ArrowRight'] || keys['KeyD'];
const jumpHeld = () => keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
const jumpJust = () => justPressed['Space'] || justPressed['ArrowUp'] || justPressed['KeyW'];
const sprintHeld = () => keys['ShiftLeft'] || keys['ShiftRight'];

// ═══════════════════════════════════════════════════════════════
//  AUDIO  (Web Audio, procedural — no files)
// ═══════════════════════════════════════════════════════════════
let actx = null, masterGain = null, musicGain = null, muted = false;
function audioBoot() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value = 0.35; masterGain.connect(actx.destination);
  musicGain = actx.createGain(); musicGain.gain.value = 0.5; musicGain.connect(masterGain);
  startMusic();
}
function blip(freq, dur, type='square', vol=0.3, slide=0) {
  if (!actx || muted) return;
  const o = actx.createOscillator(); const g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(20, freq + slide), actx.currentTime + dur);
  g.gain.value = 0; g.gain.linearRampToValueAtTime(vol, actx.currentTime + 0.008);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(actx.currentTime + dur + 0.02);
}
function noise(dur, vol=0.25) {
  if (!actx || muted) return;
  const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2 - 1) * (1 - i/d.length);
  const src = actx.createBufferSource(); src.buffer = buf;
  const g = actx.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(masterGain);
  src.start();
}
const sfx = {
  jump:   () => blip(440, 0.13, 'square', 0.22, 320),
  coin:   () => { blip(880, 0.06, 'square', 0.22); setTimeout(()=>blip(1320, 0.10, 'square', 0.22), 60); },
  stomp:  () => { noise(0.10, 0.18); blip(180, 0.12, 'triangle', 0.18, -120); },
  hurt:   () => { blip(330, 0.25, 'sawtooth', 0.25, -180); },
  star:   () => { [523, 659, 784, 1047].forEach((f,i)=> setTimeout(()=>blip(f, 0.12, 'square', 0.22), i*60)); },
  check:  () => { blip(660, 0.10, 'triangle', 0.22); setTimeout(()=>blip(990, 0.14, 'triangle', 0.22), 80); },
  win:    () => { [523, 659, 784, 1047, 784, 1047, 1319].forEach((f,i)=> setTimeout(()=>blip(f, 0.18, 'square', 0.26), i*120)); },
};

// ── Background music: 8-bar pentatonic loop, bass + lead ──
let musicTimer = 0;
const SCALE = [0, 2, 4, 7, 9, 12, 14, 16]; // C major pentatonic
const ROOT = 261.63;
const melodyNotes = [0, 2, 4, 7, 4, 2, 0, 2,  4, 7, 9, 7, 4, 2, 0, -1];
const bassNotes   = [0, 0, 4, 4, 5, 5, 0, 0];
function midiToHz(semi) { return ROOT * Math.pow(2, semi / 12); }
function startMusic() {
  if (!actx) return;
  const step = 0.18; // seconds per 16th
  let beat = 0;
  function scheduleBeat() {
    if (!actx) return;
    const t = actx.currentTime;
    // lead
    const ln = melodyNotes[beat % melodyNotes.length];
    if (ln >= 0 && !muted) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'square'; o.frequency.value = midiToHz(SCALE[ln % SCALE.length] + Math.floor(ln/SCALE.length)*12 + 12);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.10, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + step * 0.9);
      o.connect(g); g.connect(musicGain);
      o.start(t); o.stop(t + step);
    }
    // bass on every other beat
    if (beat % 2 === 0 && !muted) {
      const bn = bassNotes[(beat/2) % bassNotes.length];
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'triangle'; o.frequency.value = midiToHz(SCALE[bn % SCALE.length] - 12);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.18, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + step * 1.8);
      o.connect(g); g.connect(musicGain);
      o.start(t); o.stop(t + step * 2);
    }
    beat++;
    musicTimer = setTimeout(scheduleBeat, step * 1000);
  }
  scheduleBeat();
}

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
const state = {
  started: false,
  won: false,
  winTimer: 0,
  player: null,
  coins: [],
  enemies: [],
  particles: [],
  shapes: [],
  star: null,
  checkpoint: null,
  flag: null,
  camera: { x: 0, y: 0 },
  shake: 0,
  hueOffset: 0,
  starTime: 0,
  coinsCollected: 0,
  spawnPoint: null,
  invuln: 0,
};

function resetWorld() {
  state.player = {
    x: state.spawnPoint ? state.spawnPoint.x : entitiesInit.playerStart.x,
    y: state.spawnPoint ? state.spawnPoint.y : entitiesInit.playerStart.y,
    vx: 0, vy: 0, w: 11, h: 14,
    facing: 1, onGround: false,
    coyote: 0, jumpBuf: 0,
    walkAnim: 0,
    trail: [],
  };
  state.coins = entitiesInit.coins.map(c => ({ ...c, taken: false }));
  state.enemies = entitiesInit.enemies.map(e => ({
    x: e.spawnX + 2, y: e.spawnY + 2, vx: -0.6, vy: 0, w: 12, h: 12,
    dead: false, deadTimer: 0, wobble: 0,
  }));
  state.star = entitiesInit.star ? { ...entitiesInit.star, taken: false, spin: 0 } : null;
  state.checkpoint = entitiesInit.checkpoint ? { ...entitiesInit.checkpoint, hit: false } : null;
  state.flag = entitiesInit.flag ? { ...entitiesInit.flag } : null;
  state.particles = [];
  state.shapes = [];
  for (let i = 0; i < 8; i++) {
    state.shapes.push({
      x: Math.random() * WORLD_W, y: Math.random() * VIEW_H * 0.7,
      vx: -0.2 - Math.random() * 0.3, vy: (Math.random() - 0.5) * 0.2,
      kind: Math.floor(Math.random() * 3), size: 6 + Math.random() * 10,
      rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 0.04,
      hue: Math.random() * 360,
    });
  }
  state.camera.x = 0; state.camera.y = 0;
  state.shake = 0; state.starTime = 0; state.invuln = 0;
  state.won = false; state.winTimer = 0;
}

function startGame() {
  state.started = true;
  document.getElementById('title').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  state.coinsCollected = 0;
  state.spawnPoint = null;
  resetWorld();
  audioBoot();
}

// ═══════════════════════════════════════════════════════════════
//  PHYSICS / COLLISION
// ═══════════════════════════════════════════════════════════════
function tileAt(tx, ty) {
  if (tx < 0 || tx >= LEVEL_W || ty < 0 || ty >= LEVEL_H) return false;
  return solids[ty][tx];
}
// box-vs-tilemap, axis-separated. Returns {grounded, hitCeil, hitWallX}
function moveAndCollide(b, dx, dy) {
  const out = { grounded: false, hitCeil: false, hitWallX: 0 };
  // X axis
  b.x += dx;
  let x0 = Math.floor(b.x / TILE), x1 = Math.floor((b.x + b.w - 1) / TILE);
  let y0 = Math.floor(b.y / TILE), y1 = Math.floor((b.y + b.h - 1) / TILE);
  if (dx > 0) {
    for (let ty = y0; ty <= y1; ty++) {
      if (tileAt(x1, ty)) { b.x = x1 * TILE - b.w; out.hitWallX = 1; break; }
    }
  } else if (dx < 0) {
    for (let ty = y0; ty <= y1; ty++) {
      if (tileAt(x0, ty)) { b.x = (x0 + 1) * TILE; out.hitWallX = -1; break; }
    }
  }
  // Y axis
  b.y += dy;
  x0 = Math.floor(b.x / TILE); x1 = Math.floor((b.x + b.w - 1) / TILE);
  y0 = Math.floor(b.y / TILE); y1 = Math.floor((b.y + b.h - 1) / TILE);
  if (dy > 0) {
    for (let tx = x0; tx <= x1; tx++) {
      if (tileAt(tx, y1)) { b.y = y1 * TILE - b.h; out.grounded = true; break; }
    }
  } else if (dy < 0) {
    for (let tx = x0; tx <= x1; tx++) {
      if (tileAt(tx, y0)) { b.y = (y0 + 1) * TILE; out.hitCeil = true; break; }
    }
  }
  return out;
}

function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ═══════════════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════════════
function spawnParticles(x, y, n, opts={}) {
  for (let i = 0; i < n; i++) {
    state.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * (opts.spread || 3),
      vy: (Math.random() - 0.5) * (opts.spread || 3) - (opts.up || 0),
      life: opts.life || 24,
      maxLife: opts.life || 24,
      hue: opts.hue !== undefined ? opts.hue : Math.random() * 360,
      size: opts.size || (1 + Math.random() * 2),
      gravity: opts.gravity !== undefined ? opts.gravity : 0.15,
    });
  }
}

// ═══════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════
function update() {
  state.hueOffset += state.starTime > 0 ? 6 : 0.4;
  state.hueOffset %= 360;

  if (state.won) {
    state.winTimer++;
    state.shake = Math.max(state.shake - 0.4, 0);
    updateParticles();
    return;
  }

  const p = state.player;

  // ── Horizontal input ──
  const maxSpd = sprintHeld() ? MAX_SPRINT : MAX_RUN;
  if (left() && !right()) { p.vx -= ACCEL; if (p.vx < -maxSpd) p.vx = -maxSpd; p.facing = -1; }
  else if (right() && !left()) { p.vx += ACCEL; if (p.vx > maxSpd) p.vx = maxSpd; p.facing = 1; }
  else {
    if (p.vx > 0) p.vx = Math.max(0, p.vx - FRICTION);
    else if (p.vx < 0) p.vx = Math.min(0, p.vx + FRICTION);
  }

  // ── Jump (with coyote + buffer) ──
  if (jumpJust()) p.jumpBuf = JUMP_BUFFER_FRAMES;
  if (p.jumpBuf > 0 && p.coyote > 0) {
    p.vy = JUMP_V;
    p.coyote = 0; p.jumpBuf = 0;
    sfx.jump();
    spawnParticles(p.x + p.w/2, p.y + p.h, 5, { spread: 1.5, up: -0.5, life: 18, hue: state.hueOffset + 200, gravity: 0.05 });
  }
  if (!jumpHeld() && p.vy < JUMP_CUT) p.vy = JUMP_CUT;
  if (p.jumpBuf > 0) p.jumpBuf--;

  // ── Gravity ──
  p.vy += GRAVITY;
  if (p.vy > MAX_FALL) p.vy = MAX_FALL;

  // ── Move + collide ──
  const wasOnGround = p.onGround;
  const r = moveAndCollide(p, p.vx, 0);
  if (r.hitWallX) p.vx = 0;
  const r2 = moveAndCollide(p, 0, p.vy);
  if (r2.hitCeil) p.vy = 0.5;
  if (r2.grounded) {
    if (!wasOnGround && p.vy > 4) {
      state.shake = Math.min(state.shake + p.vy * 0.4, 8);
      spawnParticles(p.x + p.w/2, p.y + p.h, 7, { spread: 2, life: 16, hue: state.hueOffset + 180, gravity: 0.05 });
    }
    p.vy = 0;
    p.onGround = true;
    p.coyote = COYOTE_FRAMES;
  } else {
    p.onGround = false;
    if (p.coyote > 0) p.coyote--;
  }

  // ── Walk animation + sprint trail ──
  if (Math.abs(p.vx) > 0.5 && p.onGround) {
    p.walkAnim += Math.abs(p.vx) * 0.2;
    if (Math.random() < 0.2) spawnParticles(p.x + p.w/2, p.y + p.h - 1, 1, { spread: 0.6, life: 10, hue: state.hueOffset + 50, gravity: 0.02, size: 1 });
  }
  if (sprintHeld() && Math.abs(p.vx) > 2) {
    p.trail.unshift({ x: p.x, y: p.y, facing: p.facing });
    if (p.trail.length > 6) p.trail.pop();
  } else if (p.trail.length) {
    p.trail.pop();
  }

  // ── Fell in pit ──
  if (p.y > WORLD_H + 40) {
    sfx.hurt();
    state.shake = 8;
    state.invuln = 60;
    resetPlayerToCheckpoint();
  }

  // ── Coin pickups ──
  for (const c of state.coins) {
    if (c.taken) continue;
    c.spin += 0.15;
    if (aabb({ x: c.x, y: c.y, w: 8, h: 8 }, p)) {
      c.taken = true;
      state.coinsCollected++;
      sfx.coin();
      spawnParticles(c.x + 4, c.y + 4, 8, { spread: 2.5, life: 22, hue: 50, gravity: 0.06 });
    }
  }

  // ── Star pickup ──
  if (state.star && !state.star.taken) {
    state.star.spin += 0.1;
    if (aabb({ x: state.star.x, y: state.star.y, w: 14, h: 14 }, p)) {
      state.star.taken = true;
      state.starTime = STAR_DURATION;
      sfx.star();
      spawnParticles(state.star.x + 7, state.star.y + 7, 20, { spread: 4, life: 40, gravity: 0.02 });
    }
  }

  // ── Checkpoint ──
  if (state.checkpoint && !state.checkpoint.hit) {
    if (aabb({ x: state.checkpoint.x, y: state.checkpoint.y, w: 16, h: 32 }, p)) {
      state.checkpoint.hit = true;
      state.spawnPoint = { x: state.checkpoint.x, y: state.checkpoint.y };
      sfx.check();
      spawnParticles(state.checkpoint.x + 8, state.checkpoint.y, 12, { spread: 3, life: 30, hue: 120, up: 1 });
    }
  }

  // ── Flag (win) ──
  if (state.flag && aabb({ x: state.flag.x, y: state.flag.y - 16, w: 16, h: 48 }, p)) {
    state.won = true;
    state.winTimer = 0;
    sfx.win();
    state.shake = 6;
  }

  // ── Enemies ──
  for (const e of state.enemies) {
    if (e.dead) {
      e.deadTimer--;
      e.y += 0.4;
      continue;
    }
    e.wobble += 0.15;
    e.vy += GRAVITY;
    if (e.vy > MAX_FALL) e.vy = MAX_FALL;
    const eRes = moveAndCollide(e, e.vx, 0);
    if (eRes.hitWallX) e.vx = -e.vx;
    const eRes2 = moveAndCollide(e, 0, e.vy);
    if (eRes2.grounded) {
      e.vy = 0;
      // ledge check: if no ground in front, turn around
      const aheadX = Math.floor((e.x + (e.vx > 0 ? e.w + 1 : -1)) / TILE);
      const belowY = Math.floor((e.y + e.h + 2) / TILE);
      if (!tileAt(aheadX, belowY)) e.vx = -e.vx;
    }

    // collision with player
    if (state.invuln <= 0 && aabb(e, p)) {
      if (state.starTime > 0) {
        e.dead = true; e.deadTimer = 30; e.vy = -3;
        sfx.stomp();
        spawnParticles(e.x + e.w/2, e.y + e.h/2, 10, { spread: 3, life: 24 });
      } else if (p.vy > 0 && p.y + p.h - 6 < e.y) {
        // stomp
        e.dead = true; e.deadTimer = 20; e.vy = 0;
        p.vy = JUMP_V * 0.7;
        sfx.stomp();
        state.shake = Math.min(state.shake + 3, 6);
        spawnParticles(e.x + e.w/2, e.y + e.h, 8, { spread: 3, life: 18 });
        state.coinsCollected += 0; // could add score
      } else {
        // hurt
        sfx.hurt();
        state.shake = 6;
        state.invuln = 90;
        p.vx = (p.x < e.x ? -3 : 3);
        p.vy = -4;
        // simple "lose": for demo, just teleport to checkpoint
        // (single-hit forgiveness: just bounce + flash, no lives system for brevity)
      }
    }
  }
  state.enemies = state.enemies.filter(e => !e.dead || e.deadTimer > 0);

  if (state.invuln > 0) state.invuln--;
  if (state.starTime > 0) state.starTime--;

  // ── Particles ──
  updateParticles();

  // ── Floating background shapes ──
  for (const s of state.shapes) {
    s.x += s.vx; s.y += s.vy; s.rot += s.vrot;
    if (s.x < state.camera.x - 40) { s.x = state.camera.x + VIEW_W + 20; s.y = Math.random() * VIEW_H * 0.7; }
  }

  // ── Camera ──
  const targetCamX = Math.max(0, Math.min(WORLD_W - VIEW_W, p.x + p.w/2 - VIEW_W/2));
  state.camera.x += (targetCamX - state.camera.x) * 0.12;
  state.shake = Math.max(0, state.shake - 0.35);

  // ── Restart key ──
  if (justPressed['KeyR']) { state.spawnPoint = null; resetWorld(); }
  if (justPressed['KeyM']) { muted = !muted; masterGain && (masterGain.gain.value = muted ? 0 : 0.35); }

  // clear just-pressed map
  for (const k in justPressed) delete justPressed[k];
}

function updateParticles() {
  for (const pt of state.particles) {
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += pt.gravity;
    pt.life--;
  }
  state.particles = state.particles.filter(pt => pt.life > 0);
}

function resetPlayerToCheckpoint() {
  const p = state.player;
  if (state.spawnPoint) { p.x = state.spawnPoint.x; p.y = state.spawnPoint.y; }
  else { p.x = entitiesInit.playerStart.x; p.y = entitiesInit.playerStart.y; }
  p.vx = 0; p.vy = 0; p.trail = [];
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// scale canvas via CSS to fit viewport while preserving aspect
function fitCanvas() {
  const ratio = VIEW_W / VIEW_H;
  const winRatio = innerWidth / innerHeight;
  let w, h;
  if (winRatio > ratio) { h = innerHeight; w = h * ratio; }
  else { w = innerWidth; h = w / ratio; }
  // round down to integer multiples for crisp pixels
  const scale = Math.max(1, Math.floor(Math.min(w / VIEW_W, h / VIEW_H)));
  canvas.style.width = (VIEW_W * scale) + 'px';
  canvas.style.height = (VIEW_H * scale) + 'px';
}
fitCanvas();
addEventListener('resize', fitCanvas);

function hsl(h, s, l, a=1) { return `hsla(${(h + state.hueOffset) % 360}, ${s}%, ${l}%, ${a})`; }

function drawBackground() {
  const t = performance.now() / 1000;
  // ── Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, VIEW_H);
  grad.addColorStop(0,    hsl(280, 80, 18));
  grad.addColorStop(0.55, hsl(320, 70, 28));
  grad.addColorStop(1,    hsl(20,  80, 38));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // ── Giant rotating sun (concentric rings)
  const cx = VIEW_W * 0.7 - state.camera.x * 0.1;
  const cy = VIEW_H * 0.4;
  for (let i = 8; i > 0; i--) {
    ctx.beginPath();
    ctx.arc(cx, cy, i * 10, 0, Math.PI * 2);
    ctx.fillStyle = hsl(40 + i * 18 + t * 30, 80, 50 + Math.sin(t + i) * 8, 0.35);
    ctx.fill();
  }

  // ── Lava-lamp blobs (additive feel via low alpha overlays)
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 3; i++) {
    const bx = (Math.sin(t * 0.3 + i * 2) * 0.5 + 0.5) * VIEW_W;
    const by = (Math.cos(t * 0.25 + i * 1.7) * 0.4 + 0.5) * VIEW_H;
    const br = 40 + Math.sin(t + i) * 12;
    const g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
    g.addColorStop(0, hsl(i * 90 + t * 40, 90, 60, 0.5));
    g.addColorStop(1, hsl(i * 90 + t * 40, 90, 60, 0));
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
  ctx.globalCompositeOperation = 'source-over';

  // ── Parallax distant mountains
  ctx.fillStyle = hsl(260, 50, 22, 0.7);
  const mOff = state.camera.x * 0.2;
  ctx.beginPath();
  ctx.moveTo(0, VIEW_H);
  for (let x = 0; x <= VIEW_W + 32; x += 16) {
    const wx = x + mOff;
    const h = 40 + Math.sin(wx * 0.05) * 14 + Math.sin(wx * 0.013) * 22;
    ctx.lineTo(x, VIEW_H - 40 - h);
  }
  ctx.lineTo(VIEW_W, VIEW_H);
  ctx.closePath();
  ctx.fill();

  // closer mountains
  ctx.fillStyle = hsl(300, 55, 28, 0.85);
  const mOff2 = state.camera.x * 0.45;
  ctx.beginPath();
  ctx.moveTo(0, VIEW_H);
  for (let x = 0; x <= VIEW_W + 24; x += 12) {
    const wx = x + mOff2;
    const h = 24 + Math.sin(wx * 0.08 + 1) * 12 + Math.cos(wx * 0.02) * 16;
    ctx.lineTo(x, VIEW_H - 24 - h);
  }
  ctx.lineTo(VIEW_W, VIEW_H);
  ctx.closePath();
  ctx.fill();

  // floating shapes
  ctx.globalCompositeOperation = 'lighter';
  for (const s of state.shapes) {
    const sx = s.x - state.camera.x * 0.6;
    if (sx < -30 || sx > VIEW_W + 30) continue;
    ctx.save();
    ctx.translate(sx, s.y);
    ctx.rotate(s.rot);
    ctx.fillStyle = hsl(s.hue + t * 20, 80, 60, 0.35);
    if (s.kind === 0) {
      ctx.beginPath();
      ctx.moveTo(0, -s.size); ctx.lineTo(s.size, s.size); ctx.lineTo(-s.size, s.size); ctx.closePath();
      ctx.fill();
    } else if (s.kind === 1) {
      ctx.beginPath(); ctx.arc(0, 0, s.size, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillRect(-s.size/2, -s.size/2, s.size, s.size);
    }
    ctx.restore();
  }
  ctx.globalCompositeOperation = 'source-over';
}

function drawTile(tx, ty, c) {
  const px = tx * TILE - state.camera.x;
  const py = ty * TILE;
  if (px < -TILE || px > VIEW_W) return;
  if (c === 'G') {
    // grass-topped ground block
    ctx.fillStyle = hsl(35, 70, 30);
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = hsl(120, 60, 40);
    ctx.fillRect(px, py, TILE, 4);
    // speckles
    ctx.fillStyle = hsl(35, 70, 22);
    ctx.fillRect(px + 3, py + 8, 2, 2);
    ctx.fillRect(px + 10, py + 11, 2, 2);
    ctx.fillRect(px + 6, py + 13, 1, 1);
  } else if (c === '=') {
    // floating platform — chunky candy bar
    ctx.fillStyle = hsl(300, 60, 45);
    ctx.fillRect(px, py + 2, TILE, TILE - 4);
    ctx.fillStyle = hsl(320, 80, 65);
    ctx.fillRect(px, py + 2, TILE, 2);
    ctx.fillStyle = hsl(280, 60, 30);
    ctx.fillRect(px, py + TILE - 4, TILE, 2);
  }
}

function drawTiles() {
  const startX = Math.max(0, Math.floor(state.camera.x / TILE) - 1);
  const endX = Math.min(LEVEL_W - 1, Math.ceil((state.camera.x + VIEW_W) / TILE) + 1);
  for (let y = 0; y < LEVEL_H; y++) {
    for (let x = startX; x <= endX; x++) {
      const c = LEVEL[y][x];
      if (c === 'G' || c === '=') drawTile(x, y, c);
    }
  }
}

function drawCoin(c) {
  const x = c.x - state.camera.x;
  const y = c.y;
  const w = Math.abs(Math.cos(c.spin)) * 6 + 2;
  // glow
  ctx.fillStyle = hsl(50, 100, 70, 0.3);
  ctx.beginPath(); ctx.arc(x + 4, y + 4, 7, 0, Math.PI * 2); ctx.fill();
  // body
  ctx.fillStyle = hsl(48, 100, 55);
  ctx.fillRect(x + 4 - w/2, y, w, 8);
  ctx.fillStyle = hsl(56, 100, 75);
  ctx.fillRect(x + 4 - w/2, y + 1, w, 2);
}

function drawStar(s) {
  const x = s.x - state.camera.x;
  const y = s.y;
  const cx = x + 7, cy = y + 7;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(s.spin);
  for (let i = 0; i < 5; i++) {
    ctx.rotate(Math.PI * 2 / 5);
    ctx.fillStyle = hsl(50 + i * 30, 100, 60);
    ctx.beginPath();
    ctx.moveTo(0, -8);
    ctx.lineTo(2, -2);
    ctx.lineTo(8, 0);
    ctx.lineTo(2, 2);
    ctx.lineTo(0, 8);
    ctx.lineTo(-2, 2);
    ctx.lineTo(-8, 0);
    ctx.lineTo(-2, -2);
    ctx.closePath();
    ctx.fill();
    break; // single star, but the rotate gives the spin
  }
  ctx.restore();
}

function drawCheckpoint(cp) {
  const x = cp.x - state.camera.x;
  const y = cp.y;
  // pole
  ctx.fillStyle = hsl(0, 0, 70);
  ctx.fillRect(x + 7, y - 16, 2, 48);
  // flag
  ctx.fillStyle = cp.hit ? hsl(120, 80, 55) : hsl(0, 0, 55);
  ctx.beginPath();
  ctx.moveTo(x + 9, y - 14);
  ctx.lineTo(x + 20, y - 11);
  ctx.lineTo(x + 9, y - 8);
  ctx.closePath();
  ctx.fill();
}

function drawFlag(f) {
  const x = f.x - state.camera.x;
  const y = f.y;
  const t = performance.now() / 200;
  // pole
  ctx.fillStyle = hsl(0, 0, 85);
  ctx.fillRect(x + 7, y - 32, 2, 64);
  // ball top
  ctx.fillStyle = hsl(50 + Math.sin(t) * 30, 100, 65);
  ctx.beginPath(); ctx.arc(x + 8, y - 34, 3, 0, Math.PI * 2); ctx.fill();
  // flag (animated wave)
  for (let i = 0; i < 12; i++) {
    const wave = Math.sin(t + i * 0.4) * 2;
    ctx.fillStyle = hsl(i * 28, 90, 60);
    ctx.fillRect(x + 9, y - 32 + i * 2 + wave, 14, 2);
  }
}

function drawEnemy(e) {
  const x = e.x - state.camera.x;
  const y = e.y;
  const wob = Math.sin(e.wobble) * 1;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(x + 6, y + e.h, 7, 2, 0, 0, Math.PI * 2); ctx.fill();
  // cap (mushroom)
  ctx.fillStyle = hsl(0, 80, 50);
  ctx.beginPath();
  ctx.arc(x + 6, y + 5 + wob, 7, Math.PI, 0);
  ctx.fill();
  // spots
  ctx.fillStyle = hsl(0, 0, 95);
  ctx.fillRect(x + 2, y + 3 + wob, 2, 2);
  ctx.fillRect(x + 8, y + 2 + wob, 3, 2);
  // stem
  ctx.fillStyle = hsl(40, 30, 85);
  ctx.fillRect(x + 3, y + 7 + wob, 6, 5);
  // eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 4, y + 8 + wob, 1, 2);
  ctx.fillRect(x + 7, y + 8 + wob, 1, 2);
  if (e.dead) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x, y + e.h - 2, e.w, 2);
  }
}

function drawPlayer() {
  const p = state.player;
  // trail
  for (let i = p.trail.length - 1; i >= 0; i--) {
    const t = p.trail[i];
    const alpha = (1 - i / p.trail.length) * 0.4;
    drawPlayerSprite(t.x - state.camera.x, t.y, t.facing, 0, true, alpha);
  }
  if (state.invuln > 0 && Math.floor(state.invuln / 4) % 2 === 0) return; // flash
  drawPlayerSprite(p.x - state.camera.x, p.y, p.facing, p.walkAnim, false, 1);
}

function drawPlayerSprite(x, y, facing, walkAnim, ghost, alpha) {
  ctx.globalAlpha = alpha;
  const starGlow = state.starTime > 0;
  // shadow
  if (!ghost) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(x + 5, y + 14, 6, 2, 0, 0, Math.PI * 2); ctx.fill();
  }
  // legs (animate)
  const legPhase = Math.floor(walkAnim) % 2;
  ctx.fillStyle = starGlow ? hsl(state.hueOffset * 3 % 360, 100, 60) : hsl(220, 70, 40);
  ctx.fillRect(x + 1, y + 11, 3, 3);
  ctx.fillRect(x + 7, y + 11 + (legPhase ? -1 : 0), 3, 3);
  // body
  ctx.fillStyle = starGlow ? hsl(state.hueOffset * 2 % 360, 100, 55) : hsl(340, 80, 50);
  ctx.fillRect(x, y + 5, 11, 7);
  // overall stripe
  ctx.fillStyle = starGlow ? hsl(state.hueOffset + 180, 100, 60) : hsl(40, 90, 50);
  ctx.fillRect(x + 3, y + 7, 5, 4);
  // head
  ctx.fillStyle = hsl(30, 80, 75);
  ctx.fillRect(x + 1, y, 9, 6);
  // hair / hat (cyan beanie!)
  ctx.fillStyle = starGlow ? hsl(state.hueOffset + 60, 100, 55) : hsl(180, 90, 50);
  ctx.fillRect(x, y - 1, 11, 3);
  ctx.fillRect(x + 3, y - 3, 5, 2);
  // eye
  ctx.fillStyle = '#000';
  if (facing >= 0) ctx.fillRect(x + 7, y + 3, 1, 2);
  else ctx.fillRect(x + 3, y + 3, 1, 2);
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (const pt of state.particles) {
    const a = pt.life / pt.maxLife;
    ctx.fillStyle = hsl(pt.hue, 100, 60, a);
    ctx.fillRect(pt.x - state.camera.x, pt.y, pt.size, pt.size);
  }
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  for (let y = 0; y < VIEW_H; y += 2) {
    ctx.fillRect(0, y, VIEW_W, 1);
  }
}

function drawVictoryKaleidoscope() {
  const t = state.winTimer;
  ctx.save();
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.7, t / 60)})`;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  ctx.translate(VIEW_W/2, VIEW_H/2);
  ctx.rotate(t * 0.02);
  const slices = 8;
  for (let i = 0; i < slices; i++) {
    ctx.save();
    ctx.rotate((Math.PI * 2 / slices) * i);
    ctx.fillStyle = hsl(i * 45 + t * 4, 100, 60, 0.7);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(VIEW_W, -8);
    ctx.lineTo(VIEW_W, 8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = hsl(0, 100, 60);
  ctx.shadowBlur = 12;
  ctx.fillText('✦ YOU WIN ✦', VIEW_W/2, VIEW_H/2 - 10);
  ctx.font = '8px monospace';
  ctx.fillText(`COINS: ${state.coinsCollected}`, VIEW_W/2, VIEW_H/2 + 8);
  ctx.fillText('PRESS R TO PLAY AGAIN', VIEW_W/2, VIEW_H/2 + 22);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'start';
}

function render() {
  // screen shake offset
  const sx = (Math.random() - 0.5) * state.shake;
  const sy = (Math.random() - 0.5) * state.shake;
  ctx.save();
  ctx.translate(sx, sy);

  drawBackground();
  drawTiles();
  // coins
  for (const c of state.coins) if (!c.taken) drawCoin(c);
  // star
  if (state.star && !state.star.taken) drawStar(state.star);
  // checkpoint
  if (state.checkpoint) drawCheckpoint(state.checkpoint);
  // flag
  if (state.flag) drawFlag(state.flag);
  // enemies
  for (const e of state.enemies) drawEnemy(e);
  // player
  drawPlayer();
  // particles on top
  drawParticles();

  // star-mode rainbow overlay
  if (state.starTime > 0) {
    ctx.globalCompositeOperation = 'overlay';
    ctx.fillStyle = hsl(state.starTime * 8 % 360, 100, 60, 0.18);
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.globalCompositeOperation = 'source-over';
  }

  drawScanlines();

  if (state.won) drawVictoryKaleidoscope();

  ctx.restore();

  // HUD
  document.getElementById('hud-coins').textContent =
    'COINS: ' + String(state.coinsCollected).padStart(2, '0');
}

// ═══════════════════════════════════════════════════════════════
//  LOOP  (fixed-timestep update, render every frame)
// ═══════════════════════════════════════════════════════════════
const STEP = 1000 / 60;
let acc = 0, last = performance.now();
function loop(now) {
  const delta = Math.min(100, now - last);
  last = now;
  if (state.started) {
    acc += delta;
    let safety = 5;
    while (acc >= STEP && safety-- > 0) {
      update();
      acc -= STEP;
    }
  } else {
    // title-screen idle: animate hue + shapes
    state.hueOffset = (state.hueOffset + 0.5) % 360;
    for (const s of (state.shapes.length ? state.shapes : [])) {
      s.x += s.vx; s.y += s.vy; s.rot += s.vrot;
    }
  }
  render();
  requestAnimationFrame(loop);
}

// seed background shapes for title screen
for (let i = 0; i < 8; i++) {
  state.shapes.push({
    x: Math.random() * VIEW_W, y: Math.random() * VIEW_H,
    vx: -0.2 - Math.random() * 0.3, vy: (Math.random() - 0.5) * 0.2,
    kind: Math.floor(Math.random() * 3), size: 6 + Math.random() * 10,
    rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 0.04,
    hue: Math.random() * 360,
  });
}

requestAnimationFrame(loop);
})();
</script>
</body>
</html>
