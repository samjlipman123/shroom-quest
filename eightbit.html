<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RESISTANCE — 8-Bit Top-Down Shooter</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-family: "Courier New", monospace; color: #fff;
    -webkit-user-select: none; user-select: none; touch-action: none; }
  #c { image-rendering: pixelated; image-rendering: crisp-edges;
    box-shadow: 0 0 0 4px #222, 0 0 24px #000; cursor: crosshair; }
  #cap { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 3px; opacity: 0.65; text-align: center; }
</style>
</head>
<body>
<canvas id="c" width="256" height="240"></canvas>
<div id="cap">← → ↑ ↓ MOVE &nbsp;·&nbsp; SPACE / Z = SHOOT &nbsp;·&nbsp; LAST MOVE = FACING</div>
<script>
(() => {
'use strict';

// ═══════════════════════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════════════════════
const P = {
  floor:    '#503020',
  floorD:   '#381810',
  floorH:   '#683828',
  floorDot: '#A04830',
  wall:     '#787878',
  wallD:    '#383838',
  wallH:    '#A8A8A8',
  blood:    '#A00000',
  // hero (resistance — olive drab + green helmet, friendly)
  heroSkin: '#FCBCB0',
  heroUni:  '#587028',
  heroUniD: '#304018',
  heroHelm: '#406030',
  heroHelmH:'#608048',
  heroBoot: '#382010',
  // enemy (grey-uniform soldier with stahlhelm — no real-world symbols)
  enUni:    '#586070',
  enUniD:   '#283038',
  enHelm:   '#383C44',
  enHelmH:  '#585C68',
  enArm:    '#A00000',  // red armband-ish flash for visual ID
  enBoot:   '#181818',
  enSkin:   '#FCBCB0',
  // bullets
  bulletP:  '#FCD800',  // player bullets — yellow
  bulletPH: '#FC9838',
  bulletE:  '#D82800',  // enemy bullets — red
  bulletEH: '#FC6868',
  // pickups
  medRed:   '#D82800',
  medW:     '#FCFCFC',
  // misc
  spark:    '#FCD800',
  black:    '#000000',
  white:    '#FCFCFC',
};

const VW = 256, VH = 240, TILE = 16;
const HUD_H = 16;
const MAP_ROWS = 14, MAP_COLS = 16;
const MAP_OFF_Y = HUD_H;  // playable area starts at y=16

const cnv = document.getElementById('c');
const ctx = cnv.getContext('2d');
ctx.imageSmoothingEnabled = false;

function fit() {
  const r = VW / VH, wr = innerWidth / innerHeight;
  let s = wr > r ? Math.floor(innerHeight / VH) : Math.floor(innerWidth / VW);
  s = Math.max(1, s);
  cnv.style.width = (VW * s) + 'px';
  cnv.style.height = (VH * s) + 'px';
}
fit(); addEventListener('resize', fit);

// ═══════════════════════════════════════════════════════════════
//  MAP — Wolfenstein-style arena with cover
//    W wall   . floor
// ═══════════════════════════════════════════════════════════════
const MAP = [
  "WWWWWWWWWWWWWWWW",
  "W..............W",
  "W....WW....WW..W",
  "W..............W",
  "W..W..WWWW..W..W",
  "W..W........W..W",
  "W..W........W..W",
  "W..W........W..W",
  "W..W..WWWW..W..W",
  "W..............W",
  "W..WW....WW....W",
  "W..............W",
  "W..............W",
  "WWWWWWWWWWWWWWWW",
];
function isWall(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= MAP_COLS || ty >= MAP_ROWS) return true;
  return MAP[ty][tx] === 'W';
}
function tileFromX(x) { return Math.floor(x / TILE); }
function tileFromY(y) { return Math.floor((y - MAP_OFF_Y) / TILE); }

function freeFloorTile() {
  // pick a random non-wall tile not near the center spawn
  for (let i = 0; i < 100; i++) {
    const tx = 1 + Math.floor(Math.random() * (MAP_COLS - 2));
    const ty = 1 + Math.floor(Math.random() * (MAP_ROWS - 2));
    if (!isWall(tx, ty)) {
      const cx = tx * TILE + 8, cy = ty * TILE + MAP_OFF_Y + 8;
      const px = player.x + 5, py = player.y + 5;
      const dx = cx - px, dy = cy - py;
      if (dx*dx + dy*dy > 60*60) return { x: tx * TILE + 2, y: ty * TILE + MAP_OFF_Y + 2 };
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════════
let actx = null, master = null, muted = false;
function audioBoot() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.28; master.connect(actx.destination);
}
function blip(freq, dur, type='square', vol=0.25, slide=0) {
  if (!actx || muted) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(20, freq + slide), actx.currentTime + dur);
  g.gain.value = 0; g.gain.linearRampToValueAtTime(vol, actx.currentTime + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g); g.connect(master);
  o.start(); o.stop(actx.currentTime + dur + 0.02);
}
function noise(dur, vol=0.2) {
  if (!actx || muted) return;
  const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const src = actx.createBufferSource(); src.buffer = buf;
  const g = actx.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(master);
  src.start();
}
const sfx = {
  shoot:  () => { blip(880, 0.05, 'square', 0.18, -400); noise(0.04, 0.10); },
  enShoot:() => { blip(330, 0.06, 'sawtooth', 0.16, -120); },
  kill:   () => { noise(0.10, 0.20); blip(180, 0.10, 'triangle', 0.16, -80); },
  hurt:   () => { blip(330, 0.16, 'sawtooth', 0.22, -180); },
  pickup: () => { blip(880, 0.05, 'square', 0.22); setTimeout(()=>blip(1320,0.08,'square',0.22),50); },
  wave:   () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,0.12,'square',0.22),i*70)); },
  die:    () => { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>blip(f,0.16,'square',0.24),i*100)); },
};

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const P_W = 10, P_H = 12;
const E_W = 10, E_H = 12;

let player, bullets, enemies, pickups, particles, floaters;
let score, wave, hp, maxHp;
let started, gameOver, deathTimer, happyDeath, deathPos;
let shootCD;
let tick = 0;
let shake = 0;
let highScore = +(localStorage.getItem('resistanceHigh') || 0);

function spawnConfetti(x, y, n, opts={}) {
  const colors = opts.colors || ['#D82800','#0058F8','#FCD800','#00A800','#FCFCFC','#8000B0','#FC9838'];
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * (opts.spread || 4),
      vy: (Math.random() - 0.5) * (opts.spread || 4),
      life: opts.life || 30, maxLife: opts.life || 30,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2,
    });
  }
}
function spawnFloater(x, y, text, color) {
  floaters.push({ x, y, vy: -1.0, text, color, life: 40, maxLife: 40 });
}

function reset() {
  bullets = [];
  enemies = [];
  pickups = [];
  particles = [];
  floaters = [];
  // center spawn
  player = {
    x: 7.5 * TILE + 1,
    y: 6.5 * TILE + MAP_OFF_Y + 1,
    vx: 0, vy: 0,
    facing: { dx: 0, dy: -1 },     // start facing up
    walkAnim: 0,
  };
  score = 0;
  wave = 1;
  maxHp = 5;
  hp = maxHp;
  shootCD = 0;
  gameOver = false;
  deathTimer = 0;
  happyDeath = 0;
  deathPos = null;
  shake = 0;
  startWave(wave);
}

function startWave(n) {
  const count = 3 + n;
  for (let i = 0; i < count; i++) {
    const spot = freeFloorTile();
    if (!spot) continue;
    enemies.push({
      x: spot.x, y: spot.y, vx: 0, vy: 0,
      hp: 1,
      facing: { dx: 0, dy: 1 },
      state: 'patrol',
      stateTimer: 30 + Math.floor(Math.random() * 60),
      shootTimer: 60 + Math.floor(Math.random() * 60),
      walkAnim: 0,
      flash: 0,
    });
  }
  sfx.wave();
  spawnFloater(VW/2 - 24, MAP_OFF_Y + 80, 'WAVE ' + n, P.bulletP);
}

// ── Input ──
const keys = {};
function keyToAction(code) {
  if (code === 'ArrowLeft' || code === 'KeyA') return 'left';
  if (code === 'ArrowRight' || code === 'KeyD') return 'right';
  if (code === 'ArrowUp' || code === 'KeyW') return 'up';
  if (code === 'ArrowDown' || code === 'KeyS') return 'down';
  if (code === 'Space' || code === 'KeyZ' || code === 'KeyJ') return 'shoot';
  if (code === 'KeyM') return 'mute';
  return null;
}
addEventListener('keydown', e => {
  const a = keyToAction(e.code);
  if (!a) return;
  e.preventDefault();
  audioBoot();
  if (a === 'mute') { muted = !muted; if (master) master.gain.value = muted ? 0 : 0.28; return; }
  if (!started) { started = true; return; }
  if (gameOver) { if (deathTimer > 24) reset(); return; }
  keys[a] = true;
});
addEventListener('keyup', e => {
  const a = keyToAction(e.code);
  if (a && a !== 'mute') keys[a] = false;
});

reset();

// ═══════════════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════════════
function tryMove(box, dx, dy) {
  // returns { x, y } after wall collision (axis-separated)
  let nx = box.x + dx;
  let ny = box.y;
  // x
  if (dx > 0) {
    const tx = tileFromX(nx + box.w - 1);
    const ty0 = tileFromY(ny), ty1 = tileFromY(ny + box.h - 1);
    for (let ty = ty0; ty <= ty1; ty++) {
      if (isWall(tx, ty)) { nx = tx * TILE - box.w; break; }
    }
  } else if (dx < 0) {
    const tx = tileFromX(nx);
    const ty0 = tileFromY(ny), ty1 = tileFromY(ny + box.h - 1);
    for (let ty = ty0; ty <= ty1; ty++) {
      if (isWall(tx, ty)) { nx = (tx + 1) * TILE; break; }
    }
  }
  ny += dy;
  // y
  if (dy > 0) {
    const ty = tileFromY(ny + box.h - 1);
    const tx0 = tileFromX(nx), tx1 = tileFromX(nx + box.w - 1);
    for (let tx = tx0; tx <= tx1; tx++) {
      if (isWall(tx, ty)) { ny = ty * TILE + MAP_OFF_Y - box.h; break; }
    }
  } else if (dy < 0) {
    const ty = tileFromY(ny);
    const tx0 = tileFromX(nx), tx1 = tileFromX(nx + box.w - 1);
    for (let tx = tx0; tx <= tx1; tx++) {
      if (isWall(tx, ty)) { ny = (ty + 1) * TILE + MAP_OFF_Y; break; }
    }
  }
  return { x: nx, y: ny };
}

function hasLineOfSight(x1, y1, x2, y2) {
  // step along the line, return false if any tile is a wall
  const steps = Math.ceil(Math.hypot(x2 - x1, y2 - y1) / 4);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const px = x1 + (x2 - x1) * t;
    const py = y1 + (y2 - y1) * t;
    if (isWall(tileFromX(px), tileFromY(py))) return false;
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════
function update() {
  tick++;
  // particles, floaters always
  for (const pt of particles) { pt.x += pt.vx; pt.y += pt.vy; pt.vx *= 0.92; pt.vy *= 0.92; pt.life--; }
  particles = particles.filter(p => p.life > 0);
  for (const f of floaters) { f.y += f.vy; f.vy *= 0.94; f.life--; }
  floaters = floaters.filter(f => f.life > 0);
  if (shake > 0) shake = Math.max(0, shake - 0.4);

  if (happyDeath > 0) {
    happyDeath--;
    if (happyDeath % 4 === 0 && deathPos) spawnConfetti(deathPos.x, deathPos.y, 6, { spread: 5, life: 40 });
    if (happyDeath === 0) { gameOver = true; deathTimer = 0; }
    return;
  }
  if (gameOver) { deathTimer++; return; }
  if (!started) return;

  // ── player movement ──
  let dx = 0, dy = 0;
  if (keys.left) dx -= 1;
  if (keys.right) dx += 1;
  if (keys.up) dy -= 1;
  if (keys.down) dy += 1;
  if (dx !== 0 || dy !== 0) {
    const SPEED = 1.6;
    const len = Math.hypot(dx, dy);
    const mvx = (dx / len) * SPEED;
    const mvy = (dy / len) * SPEED;
    const r = tryMove({ x: player.x, y: player.y, w: P_W, h: P_H }, mvx, mvy);
    player.x = r.x; player.y = r.y;
    player.walkAnim += SPEED * 0.3;
    // update facing — pick the dominant axis
    if (Math.abs(dx) >= Math.abs(dy)) player.facing = { dx: Math.sign(dx), dy: 0 };
    else player.facing = { dx: 0, dy: Math.sign(dy) };
  }

  // ── shoot ──
  if (shootCD > 0) shootCD--;
  if (keys.shoot && shootCD === 0) {
    const bx = player.x + P_W/2 - 1 + player.facing.dx * 6;
    const by = player.y + P_H/2 - 1 + player.facing.dy * 6;
    bullets.push({
      x: bx, y: by, vx: player.facing.dx * 4, vy: player.facing.dy * 4,
      from: 'player', life: 90,
    });
    shootCD = 9;
    sfx.shoot();
    spawnConfetti(bx, by, 3, { spread: 1.5, life: 10, colors: [P.bulletP, P.bulletPH, '#FCFCFC'] });
  }

  // ── bullets ──
  for (const b of bullets) {
    b.x += b.vx; b.y += b.vy; b.life--;
    if (isWall(tileFromX(b.x), tileFromY(b.y))) {
      b.life = 0;
      spawnConfetti(b.x, b.y, 4, { spread: 2, life: 12, colors: [P.wallH, P.wallD] });
      continue;
    }
    if (b.from === 'player') {
      for (const e of enemies) {
        if (e.hp <= 0) continue;
        if (b.x >= e.x && b.x < e.x + E_W && b.y >= e.y && b.y < e.y + E_H) {
          e.hp = 0; e.flash = 6;
          b.life = 0;
          score += 100;
          sfx.kill();
          shake = Math.min(4, shake + 2);
          spawnConfetti(e.x + 5, e.y + 6, 14, { spread: 3, life: 30, colors: [P.blood, '#FC6868', P.bulletP] });
          spawnFloater(e.x, e.y - 4, '+100', P.bulletP);
          break;
        }
      }
    } else {
      // enemy bullet → player
      if (b.x >= player.x && b.x < player.x + P_W && b.y >= player.y && b.y < player.y + P_H) {
        b.life = 0;
        hurtPlayer();
      }
    }
  }
  bullets = bullets.filter(b => b.life > 0);

  // ── enemies ──
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    if (e.flash > 0) e.flash--;
    e.stateTimer--;
    e.shootTimer--;

    const pcx = player.x + P_W/2, pcy = player.y + P_H/2;
    const ecx = e.x + E_W/2, ecy = e.y + E_H/2;
    const dxp = pcx - ecx, dyp = pcy - ecy;
    const dist = Math.hypot(dxp, dyp);
    const los = dist < 180 && hasLineOfSight(ecx, ecy, pcx, pcy);

    if (los) {
      e.state = 'chase';
      e.stateTimer = 30;
      // face the player
      if (Math.abs(dxp) >= Math.abs(dyp)) e.facing = { dx: Math.sign(dxp), dy: 0 };
      else e.facing = { dx: 0, dy: Math.sign(dyp) };
      // shoot
      if (e.shootTimer <= 0 && dist > 24) {
        const bx = e.x + E_W/2 - 1 + e.facing.dx * 6;
        const by = e.y + E_H/2 - 1 + e.facing.dy * 6;
        bullets.push({
          x: bx, y: by, vx: e.facing.dx * 2.6, vy: e.facing.dy * 2.6,
          from: 'enemy', life: 120,
        });
        e.shootTimer = 80 + Math.floor(Math.random() * 40);
        sfx.enShoot();
      }
    }

    // movement
    let mvx = 0, mvy = 0;
    if (e.state === 'chase') {
      const len = Math.max(1, dist);
      mvx = (dxp / len) * 0.7;
      mvy = (dyp / len) * 0.7;
      if (dist < 24) { mvx *= -0.2; mvy *= -0.2; }  // back off when close
    } else {
      // patrol — walk in a random direction, change occasionally
      if (e.stateTimer <= 0 || (e.vx === 0 && e.vy === 0)) {
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        const d = dirs[Math.floor(Math.random() * 4)];
        e.vx = d[0] * 0.4; e.vy = d[1] * 0.4;
        e.stateTimer = 60 + Math.floor(Math.random() * 60);
        if (e.vx !== 0) e.facing = { dx: Math.sign(e.vx), dy: 0 };
        else e.facing = { dx: 0, dy: Math.sign(e.vy) };
      }
      mvx = e.vx; mvy = e.vy;
    }
    if (mvx !== 0 || mvy !== 0) {
      const r = tryMove({ x: e.x, y: e.y, w: E_W, h: E_H }, mvx, mvy);
      // if blocked, change direction next tick
      if (r.x === e.x && r.y === e.y && e.state !== 'chase') { e.stateTimer = 0; e.vx = 0; e.vy = 0; }
      e.x = r.x; e.y = r.y;
      e.walkAnim += 0.2;
    }

    // touch damage
    if (player.x < e.x + E_W && player.x + P_W > e.x &&
        player.y < e.y + E_H && player.y + P_H > e.y) {
      hurtPlayer();
    }
  }
  enemies = enemies.filter(e => e.hp > 0);

  // ── pickups (medkit drops) ──
  for (const pk of pickups) {
    if (pk.life <= 0) continue;
    pk.life--;
    if (player.x < pk.x + 10 && player.x + P_W > pk.x &&
        player.y < pk.y + 10 && player.y + P_H > pk.y) {
      hp = Math.min(maxHp, hp + 2);
      pk.life = 0;
      sfx.pickup();
      spawnFloater(pk.x, pk.y, '+2 HP', P.medRed);
      spawnConfetti(pk.x + 5, pk.y + 5, 6, { spread: 2, life: 18, colors: [P.medRed, P.medW] });
    }
  }
  pickups = pickups.filter(p => p.life > 0);

  // chance to drop medkit when wave starts running low
  if (enemies.length === 1 && pickups.length === 0 && Math.random() < 0.02) {
    const spot = freeFloorTile();
    if (spot) pickups.push({ x: spot.x + 3, y: spot.y + 3, life: 900 });
  }

  // ── wave complete? ──
  if (enemies.length === 0) {
    wave++;
    startWave(wave);
  }
}

function hurtPlayer() {
  if (happyDeath > 0 || gameOver) return;
  hp--;
  sfx.hurt();
  shake = 4;
  spawnConfetti(player.x + 5, player.y + 6, 8, { spread: 3, life: 16, colors: [P.blood, '#FC6868'] });
  if (hp <= 0) die();
}

function die() {
  happyDeath = 60;
  deathPos = { x: player.x + 5, y: player.y + 6 };
  sfx.die();
  spawnConfetti(deathPos.x, deathPos.y, 36, { spread: 5, life: 60 });
  if (score > highScore) {
    highScore = score;
    try { localStorage.setItem('resistanceHigh', String(highScore)); } catch(e){}
  }
}

// ═══════════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════════
function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, w, h); }

function drawMap() {
  for (let ty = 0; ty < MAP_ROWS; ty++) {
    for (let tx = 0; tx < MAP_COLS; tx++) {
      const sx = tx * TILE, sy = ty * TILE + MAP_OFF_Y;
      if (MAP[ty][tx] === 'W') {
        // wall: brick texture
        px(sx, sy, TILE, TILE, P.wall);
        px(sx, sy, TILE, 1, P.wallH);
        px(sx, sy + TILE - 1, TILE, 1, P.wallD);
        // mortar lines
        px(sx, sy + 5, TILE, 1, P.wallD);
        px(sx, sy + 10, TILE, 1, P.wallD);
        px(sx + 7, sy, 1, 5, P.wallD);
        px(sx + 3, sy + 6, 1, 4, P.wallD);
        px(sx + 11, sy + 6, 1, 4, P.wallD);
        px(sx + 5, sy + 11, 1, 5, P.wallD);
      } else {
        // floor — patterned tile
        px(sx, sy, TILE, TILE, P.floor);
        px(sx, sy, TILE, 1, P.floorH);
        // diagonal pattern dots
        const dotPattern = ((tx + ty) & 1);
        if (dotPattern === 0) {
          px(sx + 3, sy + 4, 2, 2, P.floorD);
          px(sx + 11, sy + 11, 2, 2, P.floorD);
        } else {
          px(sx + 11, sy + 4, 2, 2, P.floorD);
          px(sx + 3, sy + 11, 2, 2, P.floorD);
        }
        // central highlight pixel
        px(sx + 7, sy + 7, 2, 2, P.floorDot);
      }
    }
  }
}

function drawHero(x, y, facing, walkAnim, dead) {
  const legPhase = Math.floor(walkAnim) % 2;
  // shadow
  px(x + 1, y + P_H, P_W - 2, 1, 'rgba(0,0,0,0.4)');
  // boots / legs (slight alternation while walking)
  px(x + 1, y + 9, 3, 3, P.heroBoot);
  px(x + 6, y + 9 - (legPhase ? 1 : 0), 3, 3 + (legPhase ? 1 : 0), P.heroBoot);
  // uniform body
  px(x + 1, y + 4, 8, 5, P.heroUni);
  px(x + 1, y + 8, 8, 1, P.heroUniD);
  // head / skin
  px(x + 2, y + 1, 6, 3, P.heroSkin);
  // helmet
  px(x + 1, y, 8, 2, P.heroHelm);
  px(x + 1, y, 8, 1, P.heroHelmH);
  // gun in facing direction
  if (facing.dx > 0)      { px(x + 9, y + 5, 4, 2, '#383838'); px(x + 12, y + 5, 1, 2, '#FCD800'); }
  else if (facing.dx < 0) { px(x - 3, y + 5, 4, 2, '#383838'); px(x - 3, y + 5, 1, 2, '#FCD800'); }
  else if (facing.dy > 0) { px(x + 4, y + 9, 2, 4, '#383838'); px(x + 4, y + 12, 2, 1, '#FCD800'); }
  else                    { px(x + 4, y - 3, 2, 4, '#383838'); px(x + 4, y - 3, 2, 1, '#FCD800'); }
  if (dead) {
    px(x, y + 5, P_W, 1, '#D82800');
  }
}

function drawEnemy(e) {
  const x = e.x | 0, y = e.y | 0;
  const flash = e.flash > 0 && (e.flash & 1);
  const legPhase = Math.floor(e.walkAnim) % 2;
  // shadow
  px(x + 1, y + E_H, E_W - 2, 1, 'rgba(0,0,0,0.4)');
  // boots
  px(x + 1, y + 9, 3, 3, P.enBoot);
  px(x + 6, y + 9 - (legPhase ? 1 : 0), 3, 3 + (legPhase ? 1 : 0), P.enBoot);
  // uniform
  px(x + 1, y + 4, 8, 5, flash ? P.white : P.enUni);
  px(x + 1, y + 8, 8, 1, P.enUniD);
  // armband (small red on left arm — visual ID, no symbol)
  px(x + 1, y + 5, 2, 1, P.enArm);
  // skin
  px(x + 2, y + 1, 6, 3, P.enSkin);
  // stahlhelm (broader brim than hero)
  px(x, y, 10, 1, P.enHelm);
  px(x + 1, y, 8, 2, P.enHelm);
  px(x + 1, y, 8, 1, P.enHelmH);
  // gun
  const facing = e.facing;
  if (facing.dx > 0)      { px(x + 9, y + 5, 4, 2, '#181818'); }
  else if (facing.dx < 0) { px(x - 3, y + 5, 4, 2, '#181818'); }
  else if (facing.dy > 0) { px(x + 4, y + 9, 2, 4, '#181818'); }
  else                    { px(x + 4, y - 3, 2, 4, '#181818'); }
}

function drawBullets() {
  for (const b of bullets) {
    const hot = b.from === 'player' ? P.bulletPH : P.bulletEH;
    const cold = b.from === 'player' ? P.bulletP : P.bulletE;
    // trail
    px((b.x - b.vx) | 0, (b.y - b.vy) | 0, 2, 2, hot);
    px(b.x | 0, b.y | 0, 2, 2, cold);
  }
}

function drawPickups() {
  for (const pk of pickups) {
    const wob = (tick >> 2) & 1 ? 0 : -1;
    const x = pk.x | 0, y = (pk.y + wob) | 0;
    px(x, y, 10, 10, P.medW);
    px(x, y, 10, 1, P.wallD);
    px(x, y + 9, 10, 1, P.wallD);
    px(x, y, 1, 10, P.wallD);
    px(x + 9, y, 1, 10, P.wallD);
    // red cross
    px(x + 4, y + 2, 2, 6, P.medRed);
    px(x + 2, y + 4, 6, 2, P.medRed);
  }
}

function drawParticles() {
  for (const pt of particles) {
    ctx.globalAlpha = Math.min(1, pt.life / 10);
    px(pt.x | 0, pt.y | 0, pt.size, pt.size, pt.color);
  }
  ctx.globalAlpha = 1;
}

function drawFloaters() {
  ctx.save();
  ctx.font = 'bold 9px "Courier New", monospace';
  ctx.textAlign = 'left';
  for (const f of floaters) {
    const a = Math.min(1, f.life / 12);
    ctx.globalAlpha = a;
    ctx.fillStyle = P.black;
    ctx.fillText(f.text, (f.x + 1) | 0, (f.y + 1) | 0);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x | 0, f.y | 0);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawHUD() {
  px(0, 0, VW, HUD_H, P.black);
  ctx.fillStyle = P.white;
  ctx.font = '8px "Courier News", monospace';
  ctx.fillText('SCORE ' + String(score).padStart(5, '0'), 4, 11);
  ctx.fillText('WAVE ' + String(wave).padStart(2, '0'), 100, 11);
  ctx.fillText('FOES ' + String(enemies.filter(e=>e.hp>0).length).padStart(2, '0'), 152, 11);
  // hearts (HP)
  for (let i = 0; i < maxHp; i++) {
    const x = 204 + i * 10, y = 5;
    const has = i < hp;
    const col = has ? P.medRed : P.wallD;
    // pixel heart
    px(x + 1, y, 2, 1, col); px(x + 4, y, 2, 1, col);
    px(x, y + 1, 6, 2, col);
    px(x + 1, y + 3, 4, 1, col);
    px(x + 2, y + 4, 2, 1, col);
  }
  ctx.fillStyle = P.bulletP;
  ctx.fillText('HI ' + String(highScore).padStart(5, '0'), 4, 234);
}

function drawTitle() {
  if (started) return;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, HUD_H, VW, VH - HUD_H);
  ctx.fillStyle = P.blood;
  ctx.fillRect(28, 60, VW - 56, 24);
  ctx.fillStyle = P.white;
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('RESISTANCE', VW/2, 80);
  ctx.font = '8px "Courier New", monospace';
  ctx.fillText('8-BIT  TOP-DOWN  BLITZ', VW/2, 96);
  ctx.font = '10px "Courier New", monospace';
  ctx.fillText('ARROWS / WASD = MOVE', VW/2, 124);
  ctx.fillText('SPACE / Z = SHOOT', VW/2, 140);
  ctx.fillText('CLEAR THE WAVES.', VW/2, 162);
  ctx.fillText('GREY-HELMETS WILL CHASE.', VW/2, 176);
  ctx.fillStyle = (tick >> 4) % 2 ? P.bulletP : P.white;
  ctx.fillText('▶ PRESS ANY KEY ◀', VW/2, 208);
  ctx.textAlign = 'start';
}

function drawHappyDeath() {
  if (!deathPos) return;
  const elapsed = 60 - happyDeath;
  const x = deathPos.x;
  const y = deathPos.y - elapsed * 1.0;
  // smiling hero floating up
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.sin(elapsed * 0.35) * 0.4);
  ctx.translate(-5, -6);
  // miniature happy hero (just face + helmet for clarity)
  px(0, 0, 10, 2, P.heroHelm);
  px(0, 0, 10, 1, P.heroHelmH);
  px(1, 2, 8, 4, P.heroSkin);
  // ^_^ eyes + grin
  px(2, 3, 2, 1, P.black); px(1, 2, 1, 1, P.black); px(4, 2, 1, 1, P.black);
  px(6, 3, 2, 1, P.black); px(5, 2, 1, 1, P.black); px(8, 2, 1, 1, P.black);
  px(3, 5, 4, 1, P.black);
  ctx.restore();
  if (elapsed > 8) {
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.textAlign = 'center';
    const bounce = Math.sin(elapsed * 0.4) * 3;
    ctx.fillStyle = `hsl(${(elapsed * 12) % 360},100%,65%)`;
    ctx.shadowColor = P.black; ctx.shadowBlur = 4;
    ctx.fillText('WHEEEE!', x, y - 8 + bounce);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'start';
  }
}

function drawGameOver() {
  const fade = Math.min(0.7, deathTimer / 24);
  ctx.fillStyle = `rgba(0,0,0,${fade})`;
  ctx.fillRect(0, 0, VW, VH);
  if (deathTimer < 12) return;
  ctx.fillStyle = P.bulletP;
  ctx.fillRect(28, 70, VW - 56, 82);
  ctx.fillStyle = P.black;
  ctx.fillRect(30, 72, VW - 60, 78);
  ctx.fillStyle = P.bulletP;
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WHAT A RIDE!', VW/2, 96);
  ctx.fillStyle = P.white;
  ctx.font = '10px "Courier New", monospace';
  ctx.fillText('SCORE     ' + score, VW/2, 116);
  ctx.fillText('WAVE      ' + wave, VW/2, 130);
  if (score >= highScore && score > 0) ctx.fillStyle = P.bulletP;
  ctx.fillText('HI SCORE  ' + highScore, VW/2, 144);
  if (deathTimer > 36) {
    ctx.fillStyle = (tick >> 4) % 2 ? P.bulletP : P.white;
    ctx.fillText('▶ PRESS ANY KEY TO RETRY ◀', VW/2, 174);
  }
  ctx.textAlign = 'start';
}

function frame() {
  update();

  const sx = (Math.random() - 0.5) * shake;
  const sy = (Math.random() - 0.5) * shake;
  ctx.save(); ctx.translate(sx, sy);

  drawMap();
  drawPickups();
  for (const e of enemies) drawEnemy(e);
  if (happyDeath <= 0 && !gameOver) {
    drawHero(player.x | 0, player.y | 0, player.facing, player.walkAnim, false);
  }
  drawBullets();
  drawParticles();
  drawFloaters();
  if (happyDeath > 0) drawHappyDeath();

  ctx.restore();

  drawHUD();
  drawTitle();
  if (gameOver) drawGameOver();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
