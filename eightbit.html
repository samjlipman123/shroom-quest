<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SHROOM RUN — Click to Jump</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-family: "Courier New", monospace; color: #fff;
    -webkit-user-select: none; user-select: none; touch-action: none; }
  #c { image-rendering: pixelated; image-rendering: crisp-edges;
    box-shadow: 0 0 0 4px #222, 0 0 24px #000; cursor: pointer; }
  #cap { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 3px; opacity: 0.65; text-align: center; }
</style>
</head>
<body>
<canvas id="c" width="256" height="240"></canvas>
<div id="cap">CLICK · TAP · SPACE TO JUMP &nbsp;·&nbsp; HOLD FOR HIGHER &nbsp;·&nbsp; STOMP TURTLES FROM ABOVE</div>
<script>
(() => {
'use strict';

const P = {
  sky:'#5C94FC', cloud:'#FCFCFC', cloudO:'#0058F8',
  stone:'#8898A0', stoneD:'#404858', stoneH:'#B8C0C8',
  roof:'#8000B0', roofD:'#380058',
  flag:'#D82800', flagPole:'#FCBCB0',
  window:'#FCD800', windowO:'#A04000', door:'#380058',
  gTop:'#E45C10', gBody:'#A04000', gDot:'#FCBCB0',
  brick:'#B53120', brickO:'#000000',
  pipe:'#00A800', pipeS:'#005800', pipeH:'#80D010',
  coin:'#FCD800', coinO:'#A04000',
  hatR:'#D82800', shirtR:'#D82800', pants:'#0058F8',
  skin:'#FCBCB0', hair:'#6C4400', shoe:'#6C4400',
  shellG:'#00A800', shellD:'#005800', shellH:'#80D010',
  bodyY:'#FCD800', bodyO:'#A04000',
  mushW:'#FCFCFC', mushR:'#D82800', mushS:'#FCBCB0',
  spark:'#FCD800', black:'#000000', white:'#FCFCFC',
};

const VW = 256, VH = 240, TILE = 16;
const LH = 15;
const GROUND_ROW = 12;
const PLAYER_SCREEN_X = 56;
const cnv = document.getElementById('c');
const ctx = cnv.getContext('2d');
ctx.imageSmoothingEnabled = false;

function fit() {
  const r = VW / VH, wr = innerWidth / innerHeight;
  let s = wr > r ? Math.floor(innerHeight / VH) : Math.floor(innerWidth / VW);
  s = Math.max(1, s);
  cnv.style.width = (VW * s) + 'px';
  cnv.style.height = (VH * s) + 'px';
}
fit(); addEventListener('resize', fit);

// ═══════════════════════════════════════════════════════════════
//  AUDIO  (procedural — no files)
// ═══════════════════════════════════════════════════════════════
let actx = null, master = null, muted = false;
function audioBoot() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.3; master.connect(actx.destination);
}
function blip(freq, dur, type='square', vol=0.25, slide=0) {
  if (!actx || muted) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(20, freq+slide), actx.currentTime + dur);
  g.gain.value = 0; g.gain.linearRampToValueAtTime(vol, actx.currentTime + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g); g.connect(master);
  o.start(); o.stop(actx.currentTime + dur + 0.02);
}
const sfx = {
  jump:  () => blip(540, 0.10, 'square', 0.20, 320),
  coin:  () => { blip(880, 0.05, 'square', 0.20); setTimeout(()=>blip(1320, 0.08, 'square', 0.20), 50); },
  stomp: () => { blip(220, 0.10, 'triangle', 0.22, -120); },
  power: () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,0.10,'square',0.22),i*55)); },
  die:   () => { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>blip(f,0.16,'square',0.24),i*100)); },
};

// ═══════════════════════════════════════════════════════════════
//  PROCEDURAL WORLD
// ═══════════════════════════════════════════════════════════════
const cols = new Map();   // col -> { tiles: char[LH], turtle?, coinH?, mushH? }
let generatedTo = -1;
let safeRun = 30;
let lastObstacle = null;
const turtles = [];        // {wx, wy, vx, wobble, alive, deadTimer}

function emptyTiles() { const a = []; for (let i = 0; i < LH; i++) a.push('.'); return a; }
function groundTiles() { const t = emptyTiles(); for (let y = GROUND_ROW; y < LH; y++) t[y] = 'G'; return t; }
function pitTiles() { return emptyTiles(); }
function pipeTiles(h) {
  const t = groundTiles();
  t[GROUND_ROW - h] = 'P';
  for (let y = GROUND_ROW - h + 1; y < GROUND_ROW; y++) t[y] = 'p';
  return t;
}
function brickTiles(stack) {
  const t = groundTiles();
  for (let i = 0; i < stack; i++) t[GROUND_ROW - 2 - i] = 'B';
  return t;
}

function setCol(col, tiles, extras={}) {
  cols.set(col, { tiles, ...extras });
}

function generateUpTo(targetCol) {
  let col = generatedTo + 1;
  while (col <= targetCol) {
    if (safeRun > 0) {
      const tiles = groundTiles();
      const c = { tiles };
      if (Math.random() < 0.22) c.coinH = 2 + Math.floor(Math.random() * 3);
      else if (Math.random() < 0.02 && safeRun > 4) c.mushH = 2;
      cols.set(col, c);
      safeRun--;
      col++;
      continue;
    }
    let kind;
    do {
      const r = Math.random();
      if (r < 0.25) kind = 'pit';
      else if (r < 0.45) kind = 'pipeShort';
      else if (r < 0.60) kind = 'pipeTall';
      else if (r < 0.72) kind = 'brick';
      else if (r < 0.85) kind = 'turtle';
      else kind = 'turtlePit';
    } while (kind === lastObstacle && Math.random() < 0.55);
    lastObstacle = kind;

    if (kind === 'pit') {
      const w = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < w; i++) setCol(col + i, pitTiles());
      col += w;
      safeRun = 5 + Math.floor(Math.random() * 4);
    } else if (kind === 'pipeShort') {
      setCol(col, pipeTiles(1 + Math.floor(Math.random() * 2)));
      col++;
      safeRun = 5 + Math.floor(Math.random() * 4);
    } else if (kind === 'pipeTall') {
      setCol(col, pipeTiles(3));
      col++;
      safeRun = 6 + Math.floor(Math.random() * 4);
    } else if (kind === 'brick') {
      setCol(col, brickTiles(1));
      col++;
      safeRun = 4 + Math.floor(Math.random() * 3);
    } else if (kind === 'turtle') {
      const c = { tiles: groundTiles() };
      cols.set(col, c);
      turtles.push({
        wx: col * TILE, wy: (GROUND_ROW * TILE) - 14,
        vx: -0.4 - Math.random() * 0.2, wobble: Math.random() * 6,
        alive: true, deadTimer: 0,
      });
      col++;
      safeRun = 5 + Math.floor(Math.random() * 4);
    } else if (kind === 'turtlePit') {
      // turtle just before a pit
      const c = { tiles: groundTiles() };
      cols.set(col, c);
      turtles.push({
        wx: col * TILE, wy: (GROUND_ROW * TILE) - 14,
        vx: -0.4, wobble: 0, alive: true, deadTimer: 0,
      });
      setCol(col + 1, pitTiles());
      col += 2;
      safeRun = 6 + Math.floor(Math.random() * 4);
    }
  }
  generatedTo = Math.max(generatedTo, targetCol);
}

function tileAt(tx, ty) {
  if (tx < 0 || ty < 0 || ty >= LH) return '.';
  const c = cols.get(tx);
  return c ? c.tiles[ty] : '.';
}
function solidAt(tx, ty) {
  const c = tileAt(tx, ty);
  return c === 'G' || c === 'B' || c === 'P' || c === 'p';
}
function cullBehind(behindCol) {
  for (const k of cols.keys()) if (k < behindCol) cols.delete(k);
}

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const P_W = 12, P_H = 14;
const SCROLL_INITIAL = 1.4;
let player, scrollSpeed, score, distance, started, gameOver, deathTimer;
let happyDeath = 0, deathPos = null;
let invuln = 0;
let powerTime = 0;
let particles = [];
const clouds = [], towers = [], buildings = [];
let highScore = +(localStorage.getItem('shroomRunHigh') || 0);
let tick = 0;

function spawnConfetti(x, y, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: -Math.random() * 4 - 1,
      life: 50, maxLife: 50,
      color: ['#D82800','#0058F8','#FCD800','#00A800','#FCFCFC','#8000B0'][i % 6],
      size: 2 + Math.floor(Math.random() * 2),
    });
  }
}

function reset() {
  cols.clear();
  turtles.length = 0;
  particles.length = 0;
  generatedTo = -1;
  safeRun = 30;
  lastObstacle = null;
  player = {
    wx: PLAYER_SCREEN_X, y: GROUND_ROW * TILE - P_H,
    vy: 0, onGround: false, anim: 0, jumpHold: 0,
  };
  scrollSpeed = SCROLL_INITIAL;
  score = 0;
  distance = 0;
  gameOver = false;
  happyDeath = 0;
  deathPos = null;
  deathTimer = 0;
  invuln = 0;
  powerTime = 0;
  generateUpTo(Math.floor((player.wx + VW + 64) / TILE));
  clouds.length = 0; towers.length = 0; buildings.length = 0;
  for (let i = 0; i < 6; i++) clouds.push({ wx: i * 80 + Math.random() * 60, y: 18 + Math.random() * 28 });
  for (let i = 0; i < 4; i++) towers.push({ wx: 80 + i * 220 + Math.random() * 80, h: 70 + Math.floor(Math.random() * 50) });
  for (let i = 0; i < 8; i++) buildings.push({ wx: 40 + i * 80 + Math.random() * 40, w: 24 + Math.floor(Math.random() * 14), h: 28 + Math.floor(Math.random() * 28) });
}

// ── Input ──
let jumpReq = false, jumpHeld = false;
function press(e) {
  if (e && e.preventDefault) e.preventDefault();
  audioBoot();
  if (!started) { started = true; return; }
  if (gameOver) { if (deathTimer > 24) reset(); return; }
  jumpReq = true; jumpHeld = true;
}
function release() { jumpHeld = false; }
addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { if (!e.repeat) press(e); }
  if (e.code === 'KeyM') { muted = !muted; if (master) master.gain.value = muted ? 0 : 0.3; }
});
addEventListener('keyup', e => { if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') release(); });
cnv.addEventListener('pointerdown', press);
addEventListener('pointerup', release);
cnv.addEventListener('contextmenu', e => e.preventDefault());

reset();

// ═══════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════
function update() {
  tick++;

  // ── particle update always runs ──
  for (const pt of particles) {
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.16; pt.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // ── happy death animation ──
  if (happyDeath > 0) {
    happyDeath--;
    if (happyDeath % 5 === 0 && deathPos) spawnConfetti(deathPos.x, deathPos.y, 6);
    if (happyDeath === 0) {
      gameOver = true;
      deathTimer = 0;
    }
    return;
  }

  if (gameOver) { deathTimer++; return; }
  if (!started) return;

  // difficulty
  scrollSpeed = SCROLL_INITIAL + Math.min(1.6, distance / 1800);

  // jump
  if (jumpReq && player.onGround) {
    player.vy = -6.4;
    player.onGround = false;
    player.jumpHold = 14;
    sfx.jump();
  }
  jumpReq = false;
  if (player.jumpHold > 0 && player.vy < 0 && jumpHeld) player.jumpHold--;
  else if (player.vy < -2 && !jumpHeld) { player.vy = -2; player.jumpHold = 0; }

  // gravity
  player.vy += 0.32;
  if (player.vy > 6.5) player.vy = 6.5;

  // advance world
  player.wx += scrollSpeed;
  distance = Math.floor((player.wx - PLAYER_SCREEN_X) / 8);

  // gen ahead + cull behind
  generateUpTo(Math.floor((player.wx + VW + 96) / TILE));
  if (tick % 60 === 0) cullBehind(Math.floor(player.wx / TILE) - 20);

  // X-collision with terrain → die (unless powered up: bounce instead? keep simple: still die)
  let xL = Math.floor(player.wx / TILE);
  let xR = Math.floor((player.wx + P_W - 1) / TILE);
  let yT = Math.floor(player.y / TILE);
  let yB = Math.floor((player.y + P_H - 1) / TILE);
  for (let ty = yT; ty <= yB; ty++) {
    if (solidAt(xR, ty)) { die(); return; }
  }

  // Y-move + collide
  player.y += player.vy;
  yT = Math.floor(player.y / TILE);
  yB = Math.floor((player.y + P_H - 1) / TILE);
  player.onGround = false;
  if (player.vy > 0) {
    for (let tx = xL; tx <= xR; tx++) {
      if (solidAt(tx, yB)) {
        player.y = yB * TILE - P_H;
        player.vy = 0;
        player.onGround = true;
        player.jumpHold = 0;
        break;
      }
    }
  } else if (player.vy < 0) {
    for (let tx = xL; tx <= xR; tx++) {
      if (solidAt(tx, yT)) { player.y = (yT + 1) * TILE; player.vy = 0.5; break; }
    }
  }

  if (player.onGround) player.anim += scrollSpeed * 0.18;

  // pit fall
  if (player.y > VH + 30) { die(); return; }

  // ── coin & mushroom pickups ──
  for (let tx = xL; tx <= xR; tx++) {
    const c = cols.get(tx);
    if (!c) continue;
    if (c.coinH !== undefined) {
      const cy = (GROUND_ROW - c.coinH) * TILE;
      if (player.y < cy + 16 && player.y + P_H > cy) {
        delete c.coinH; score += 100; sfx.coin();
        spawnConfetti(tx * TILE + 8 - (player.wx - PLAYER_SCREEN_X), cy, 4);
      }
    }
    if (c.mushH !== undefined) {
      const my = (GROUND_ROW - c.mushH) * TILE;
      if (player.y < my + 16 && player.y + P_H > my) {
        delete c.mushH;
        score += 500;
        powerTime = 240;
        sfx.power();
      }
    }
  }

  // ── turtles ──
  if (powerTime > 0) powerTime--;
  for (const t of turtles) {
    if (!t.alive) { t.deadTimer--; t.y = t.wy + (30 - t.deadTimer) * 0.6; continue; }
    t.wx += t.vx;
    t.wobble += 0.12;
    // collision with player
    const tBox = { x: t.wx, y: t.wy, w: 12, h: 12 };
    const pBox = { x: player.wx, y: player.y, w: P_W, h: P_H };
    if (tBox.x < pBox.x + pBox.w && tBox.x + tBox.w > pBox.x &&
        tBox.y < pBox.y + pBox.h && tBox.y + tBox.h > pBox.y) {
      if (powerTime > 0) {
        t.alive = false; t.deadTimer = 30;
        score += 500;
        sfx.stomp();
        spawnConfetti(t.wx + 6 - (player.wx - PLAYER_SCREEN_X), t.wy, 8);
      } else if (player.vy > 1 && player.y + P_H - 6 < t.wy) {
        // stomp
        t.alive = false; t.deadTimer = 30;
        score += 500;
        player.vy = -5;
        sfx.stomp();
        spawnConfetti(t.wx + 6 - (player.wx - PLAYER_SCREEN_X), t.wy, 8);
      } else if (invuln <= 0) {
        die();
        return;
      }
    }
  }
  // cull turtles far behind
  for (let i = turtles.length - 1; i >= 0; i--) {
    if (turtles[i].wx < player.wx - VW || (turtles[i].deadTimer !== undefined && turtles[i].deadTimer < -60)) turtles.splice(i, 1);
  }

  // animate parallax props by shifting their wx (so they cycle)
  for (const cl of clouds) if (cl.wx - player.wx * 0.3 < -50) cl.wx = player.wx * 0.3 + VW + 30 + Math.random() * 40;
  for (const tw of towers) if (tw.wx - player.wx * 0.6 < -60) { tw.wx = player.wx * 0.6 + VW + 40 + Math.random() * 80; tw.h = 70 + Math.floor(Math.random() * 50); }
  for (const bd of buildings) if (bd.wx - player.wx * 0.8 < -40) { bd.wx = player.wx * 0.8 + VW + 30 + Math.random() * 60; bd.w = 24 + Math.floor(Math.random() * 14); bd.h = 28 + Math.floor(Math.random() * 28); }
}

function die() {
  if (happyDeath > 0 || gameOver) return;
  happyDeath = 60;
  deathPos = { x: player.wx - (player.wx - PLAYER_SCREEN_X), y: player.y };
  sfx.die();
  spawnConfetti(deathPos.x + 6, deathPos.y + 4, 30);
  if (distance > highScore) {
    highScore = distance;
    try { localStorage.setItem('shroomRunHigh', String(highScore)); } catch(e){}
  }
}

// ═══════════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════════
function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, w, h); }

function drawCloud(x, y) {
  px(x+4, y+2, 16, 4, P.cloud); px(x+2, y+4, 20, 4, P.cloud); px(x, y+6, 24, 4, P.cloud);
  px(x, y+10, 24, 2, P.cloudO); px(x+4, y, 16, 2, P.cloudO);
}
function drawWall(x, y, w, h) {
  px(x, y, w, h, P.stone);
  px(x, y + h - 4, w, 2, P.stoneD);
  for (let i = 0; i < h; i += 6) {
    px(x, y + i, w, 1, P.stoneD);
    for (let j = 0; j < w; j += 12) {
      const off = (i / 6) % 2 ? 6 : 0;
      px(x + j + off, y + i, 1, 6, P.stoneD);
    }
  }
  px(x, y, w, 1, P.stoneH);
}
function drawTower(x, baseY, h) {
  const w = 26;
  drawWall(x, baseY - h, w, h);
  for (let i = 0; i < 13; i++) px(x + i, baseY - h - 13 + i, w - i*2, 1, i < 3 ? P.roofD : P.roof);
  px(x + 12, baseY - h - 18, 1, 4, P.flagPole);
  px(x + 13, baseY - h - 18, 4, 3, P.flag);
  px(x + 10, baseY - h + 14, 6, 6, P.windowO);
  px(x + 11, baseY - h + 15, 4, 4, P.window);
}
function drawBuilding(x, baseY, w, h) {
  drawWall(x, baseY - h, w, h);
  for (let i = 0; i < w/2; i++) px(x + i, baseY - h - i, w - i*2, 1, i < 3 ? P.roofD : P.roof);
  px(x + w/2 - 3, baseY - h + 6, 6, 5, P.windowO);
  px(x + w/2 - 2, baseY - h + 7, 4, 3, P.window);
}
function drawGround(x, y) {
  px(x, y, 16, 4, P.gTop);
  px(x, y + 4, 16, 12, P.gBody);
  px(x+3, y+6, 2, 2, P.gDot); px(x+11, y+8, 2, 2, P.gDot); px(x+5, y+12, 2, 2, P.gDot);
  px(x, y, 1, 16, P.brickO); px(x, y+15, 16, 1, P.brickO);
}
function drawBrick(x, y) {
  px(x, y, 16, 16, P.brick);
  px(x, y, 16, 1, P.brickO); px(x, y+15, 16, 1, P.brickO); px(x, y+7, 16, 1, P.brickO);
  px(x+7, y, 1, 7, P.brickO); px(x+3, y+8, 1, 7, P.brickO); px(x+11, y+8, 1, 7, P.brickO);
  px(x+1, y+1, 2, 1, '#FC9838'); px(x+9, y+1, 2, 1, '#FC9838');
}
function drawPipeTop(x, y) {
  px(x-2, y, 20, 8, P.pipe); px(x, y+8, 16, 8, P.pipe);
  px(x-2, y, 20, 2, P.pipeH); px(x-2, y+6, 20, 2, P.pipeS);
  px(x+13, y+8, 3, 8, P.pipeS);
  px(x-2, y, 1, 8, P.brickO); px(x+17, y, 1, 8, P.brickO);
  px(x, y+8, 1, 8, P.brickO); px(x+15, y+8, 1, 8, P.brickO);
}
function drawPipeBody(x, y) {
  px(x, y, 16, 16, P.pipe); px(x, y, 3, 16, P.pipeH); px(x+13, y, 3, 16, P.pipeS);
  px(x, y, 1, 16, P.brickO); px(x+15, y, 1, 16, P.brickO);
}
function drawCoin(x, y) {
  const f = (tick >> 3) % 4;
  const widths = [8, 4, 2, 4];
  const w = widths[f];
  const ox = x + (8 - w) / 2;
  px(ox, y + 2, w, 12, P.coin);
  px(ox, y + 2, w, 2, '#FC9838');
  px(ox + w - 1, y + 4, 1, 8, P.coinO);
}
function drawMushroom(x, y) {
  px(x+1, y, 10, 2, P.mushR); px(x, y+2, 12, 2, P.mushR); px(x, y+4, 12, 2, P.mushR);
  px(x+3, y+2, 2, 2, P.mushW); px(x+7, y+3, 2, 2, P.mushW);
  px(x+3, y+6, 6, 6, P.mushS);
  px(x+5, y+8, 2, 2, P.black);
}
function drawTurtle(t, camX) {
  if (!t.alive) {
    const x = (t.wx - camX) | 0, y = t.y | 0;
    px(x+1, y+8, 10, 6, P.shellD);
    px(x+1, y+8, 10, 2, P.shellH);
    return;
  }
  const x = (t.wx - camX) | 0, y = t.wy | 0;
  const wob = Math.sin(t.wobble) * 1;
  px(x+1, y+12, 3, 2, P.bodyO); px(x+8, y+12, 3, 2, P.bodyO);
  px(x+2, y+8, 8, 4, P.bodyY);
  px(x+1, y+3+wob, 10, 8, P.shellG);
  px(x+1, y+3+wob, 10, 2, P.shellH);
  px(x+1, y+9+wob, 10, 1, P.shellD);
  px(x+3, y+5+wob, 2, 2, P.shellD);
  px(x+7, y+6+wob, 2, 2, P.shellD);
  px(x-2, y+5+wob, 4, 4, P.bodyY);
  px(x-1, y+6+wob, 1, 2, P.black);
}
function drawHero(x, y, anim, airborne, happy) {
  const legFrame = airborne ? 2 : (Math.floor(anim) % 2);
  if (legFrame === 0)      { px(x+1, y+12, 4, 2, P.shoe); px(x+7, y+12, 4, 2, P.shoe); }
  else if (legFrame === 1) { px(x+1, y+11, 3, 3, P.shoe); px(x+8, y+12, 4, 2, P.shoe); }
  else                     { px(x+2, y+11, 3, 2, P.shoe); px(x+7, y+11, 3, 2, P.shoe); }
  // power-up rainbow tint?
  const shirtCol = powerTime > 0 ? `hsl(${(tick * 12) % 360},100%,60%)` : P.shirtR;
  const hatCol   = powerTime > 0 ? `hsl(${(tick * 12 + 120) % 360},100%,60%)` : P.hatR;
  px(x+1, y+8, 10, 4, P.pants);
  px(x+5, y+6, 2, 2, P.pants);
  px(x+1, y+5, 10, 4, shirtCol);
  px(x, y+6, 2, 4, shirtCol);
  px(x+10, y+6, 2, 4, shirtCol);
  px(x, y+9, 2, 2, P.skin);
  px(x+10, y+9, 2, 2, P.skin);
  px(x+2, y+2, 8, 4, P.skin);
  px(x+3, y+4, 6, 1, P.hair);
  if (happy) {
    // ^_^ closed eyes + big grin
    px(x+3, y+3, 2, 1, P.black); px(x+2, y+2, 1, 1, P.black); px(x+5, y+2, 1, 1, P.black);
    px(x+7, y+3, 2, 1, P.black); px(x+6, y+2, 1, 1, P.black); px(x+9, y+2, 1, 1, P.black);
    px(x+3, y+5, 6, 1, P.black);
    px(x+4, y+5, 4, 1, '#D82800');
    // arms up
    px(x-1, y+2, 2, 4, shirtCol);
    px(x+11, y+2, 2, 4, shirtCol);
  } else {
    px(x+7, y+3, 1, 2, P.black);
    px(x+2, y+3, 1, 2, P.hair);
  }
  px(x+1, y, 10, 2, hatCol);
  px(x+1, y+2, 3, 1, hatCol);
  px(x+8, y+2, 3, 1, hatCol);
  px(x+2, y, 2, 1, '#FC9838');
}

function drawBackground(camX) {
  ctx.fillStyle = P.sky;
  ctx.fillRect(0, 0, VW, GROUND_ROW * TILE);
  // clouds
  for (const cl of clouds) {
    const sx = cl.wx - player.wx * 0.3;
    if (sx > -30 && sx < VW + 30) drawCloud(sx, cl.y);
  }
  // mountain silhouette
  ctx.fillStyle = P.stoneD;
  ctx.beginPath(); ctx.moveTo(0, GROUND_ROW * TILE);
  for (let x = 0; x <= VW; x += 8) {
    const wx = x + player.wx * 0.4;
    const h = 38 + Math.sin(wx * 0.05) * 14 + Math.cos(wx * 0.03) * 10;
    ctx.lineTo(x, GROUND_ROW * TILE - h);
  }
  ctx.lineTo(VW, GROUND_ROW * TILE); ctx.closePath(); ctx.fill();
  // big fortress wall
  const wallTop = 110;
  drawWall(0, wallTop, VW, GROUND_ROW * TILE - wallTop);
  // battlements
  for (let i = -((player.wx * 0.7) | 0) % 16; i < VW; i += 16) {
    px(i, wallTop - 6, 8, 6, P.stone);
    px(i, wallTop - 6, 8, 1, P.stoneH);
  }
  // towers (parallax 0.6)
  for (const tw of towers) {
    const sx = tw.wx - player.wx * 0.6;
    if (sx > -40 && sx < VW + 30) drawTower(sx, GROUND_ROW * TILE, tw.h);
  }
  // buildings (parallax 0.8)
  for (const bd of buildings) {
    const sx = bd.wx - player.wx * 0.8;
    if (sx > -40 && sx < VW + 30) drawBuilding(sx, GROUND_ROW * TILE, bd.w, bd.h);
  }
}

function drawTiles(camX) {
  const startX = Math.max(0, Math.floor(camX / TILE) - 1);
  const endX = Math.ceil((camX + VW) / TILE) + 1;
  for (let tx = startX; tx <= endX; tx++) {
    const c = cols.get(tx);
    if (!c) continue;
    for (let ty = 0; ty < LH; ty++) {
      const t = c.tiles[ty];
      if (t === '.') continue;
      const sx = tx * TILE - camX, sy = ty * TILE;
      if (t === 'G') drawGround(sx, sy);
      else if (t === 'B') drawBrick(sx, sy);
      else if (t === 'P') drawPipeTop(sx, sy);
      else if (t === 'p') drawPipeBody(sx, sy);
    }
    if (c.coinH !== undefined) drawCoin(tx * TILE - camX + 4, (GROUND_ROW - c.coinH) * TILE);
    if (c.mushH !== undefined) drawMushroom(tx * TILE - camX + 2, (GROUND_ROW - c.mushH) * TILE);
  }
}

function drawHUD() {
  px(0, 0, VW, 16, P.black);
  ctx.fillStyle = P.white;
  ctx.font = '8px "Courier New", monospace';
  ctx.fillText('SCORE ' + String(score).padStart(5, '0'), 6, 11);
  ctx.fillText('DIST ' + String(distance).padStart(5, '0'), 100, 11);
  ctx.fillText('HI ' + String(highScore).padStart(5, '0'), 188, 11);
  if (powerTime > 0) {
    ctx.fillStyle = `hsl(${(tick * 12) % 360}, 100%, 60%)`;
    ctx.fillRect(0, 14, (powerTime / 240) * VW, 2);
  }
}

function drawTitle() {
  if (started) return;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 28, VW, VH - 28);
  ctx.fillStyle = P.mushR;
  ctx.fillRect(32, 60, VW - 64, 22);
  ctx.fillStyle = P.white;
  ctx.font = 'bold 18px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SHROOM RUN', VW/2, 78);
  ctx.font = '10px "Courier New", monospace';
  ctx.fillText('HOP TURTLES · DODGE PITS', VW/2, 110);
  ctx.fillText('CLICK · TAP · SPACE', VW/2, 128);
  ctx.fillText('HOLD FOR HIGHER JUMP', VW/2, 146);
  ctx.fillStyle = (tick >> 4) % 2 ? P.coin : P.white;
  ctx.fillText('▶ PRESS ANYTHING TO START ◀', VW/2, 180);
  ctx.textAlign = 'start';
}

function drawHappyDeath() {
  if (!deathPos) return;
  const elapsed = 60 - happyDeath;
  const y = deathPos.y - elapsed * 1.2;
  const x = deathPos.x;
  ctx.save();
  ctx.translate(x + 5, y + 7);
  ctx.rotate(Math.sin(elapsed * 0.35) * 0.4);
  ctx.translate(-5, -7);
  drawHero(0, 0, 0, true, true);
  ctx.restore();
  if (elapsed > 8) {
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.textAlign = 'center';
    const bounce = Math.sin(elapsed * 0.4) * 3;
    ctx.fillStyle = `hsl(${(elapsed * 12) % 360},100%,65%)`;
    ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
    ctx.fillText('WHEEEE!', x + 5, y - 6 + bounce);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'start';
  }
}

function drawGameOver() {
  const fade = Math.min(0.7, deathTimer / 24);
  ctx.fillStyle = `rgba(0,0,0,${fade})`;
  ctx.fillRect(0, 0, VW, VH);
  if (deathTimer < 12) return;
  ctx.fillStyle = P.coin;
  ctx.fillRect(28, 70, VW - 56, 78);
  ctx.fillStyle = P.black;
  ctx.fillRect(30, 72, VW - 60, 74);
  ctx.fillStyle = P.coin;
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WHAT A RIDE!', VW/2, 96);
  ctx.fillStyle = P.white;
  ctx.font = '10px "Courier New", monospace';
  ctx.fillText('DISTANCE  ' + distance, VW/2, 116);
  ctx.fillText('SCORE  ' + score, VW/2, 130);
  if (distance >= highScore && distance > 0) ctx.fillStyle = P.coin;
  ctx.fillText('HI SCORE  ' + highScore, VW/2, 144);
  if (deathTimer > 36) {
    ctx.fillStyle = (tick >> 4) % 2 ? P.coin : P.white;
    ctx.fillText('▶ CLICK TO PLAY AGAIN ◀', VW/2, 172);
  }
  ctx.textAlign = 'start';
}

function drawParticles() {
  for (const pt of particles) {
    ctx.globalAlpha = Math.min(1, pt.life / 12);
    px(pt.x | 0, pt.y | 0, pt.size, pt.size, pt.color);
  }
  ctx.globalAlpha = 1;
}

function frame() {
  update();
  const camX = player.wx - PLAYER_SCREEN_X;
  drawBackground(camX);
  // ground tiles
  drawTiles(camX);
  // turtles
  for (const t of turtles) drawTurtle(t, camX);
  // player
  if (happyDeath <= 0 && !gameOver) {
    const flashHidden = invuln > 0 && (tick >> 2) % 2 === 0;
    if (!flashHidden) drawHero(PLAYER_SCREEN_X, player.y, player.anim, !player.onGround, false);
  }
  drawParticles();
  if (happyDeath > 0) drawHappyDeath();
  drawHUD();
  drawTitle();
  if (gameOver) drawGameOver();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
